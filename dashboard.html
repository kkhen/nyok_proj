<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Form</title>
    
    <!-- Premium Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Linked to the new dedicated Dashboard CSS file -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <nav class="navbar">
        <!-- Group the logo and text together -->
        <div class="nav-brand">
            <img src="images/mlm_logo2.jpg" alt="Ministry of Liturgical Music Logo" class="nav-logo">
            <img src="images/mlm_text.jpg" alt="Ministry of Liturgical Music Text" class="nav-text">
        </div>
        
        <button id="logoutBtn" class="logout-btn">Log out</button>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        
        <div class="form-card">
            <div class="form-header">
                <h2>Attendance Form</h2>
                <p>Please confirm your details and select your schedule.</p>
            </div>

            <!-- Pre-filled Details -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" readonly>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" readonly>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" readonly>
            </div>

            <!-- Selectable Details -->
            <div class="form-group">
                <label>Organization</label>
                <div class="select-wrapper">
                    <select id="organization" required onchange="this.blur()">
                        <option value="" disabled selected>Select Organization</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Schedule / Meeting</label>
                <div class="select-wrapper">
                    <select id="schedule" required onchange="this.blur()">
                        <option value="" disabled selected>Select Schedule</option>
                    </select>
                </div>
            </div>

            <!-- Submit Action -->
            <button id="submitAttendance" class="submit-btn">
                Submit Attendance
            </button>
        </div>

    </main>

    <!-- Premium Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-icon" id="toastIcon"></div>
        <div class="toast-message" id="toastMessage">Message goes here</div>
    </div>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <svg class="modal-icon" fill="none" stroke="#4b5563" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                <h3>Log Out</h3>
            </div>
            <p class="modal-body">Are you sure you want to log out of your account?</p>
            <div class="modal-actions">
                <button id="cancelLogoutBtn" class="btn btn-outline">Cancel</button>
                <button id="confirmLogoutBtn" class="btn btn-primary">Log Out</button>
            </div>
        </div>
    </div>

    <!-- Premium Dashboard Footer -->
    <footer class="dashboard-footer">
        &copy; 2026 Ministry on Liturgical Music &bull; Our Lady of the Abandoned Parish. All rights reserved.
    </footer>

    <!-- Supabase and Logic Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/conf.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/orgs.js"></script>
    <script src="js/meetings.js"></script>
    <script src="js/dashboard.js"></script>

</body>
</html>
